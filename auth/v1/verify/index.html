<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérification — Ronin Traq</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #121A21;
      color: #F5F0E6;
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    .subtitle {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(241,168,91,0.6);
      margin-bottom: 48px;
    }

    .card {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(241,168,91,0.3);
      border-radius: 20px;
      padding: 36px 30px;
      max-width: 380px;
      width: 100%;
    }

    .icon { font-size: 40px; margin-bottom: 20px; }

    .card h2 {
      font-size: 22px;
      color: #FFD97A;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .card p {
      font-size: 14px;
      line-height: 24px;
      color: #A5AAB0;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      background: #F1A85B;
      color: #121A21;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      width: 100%;
    }

    .btn:hover { background: #FFD97A; }

    .error { border-color: rgba(226,114,91,0.3); }
    .error h2 { color: #E2725B; }

    .footer {
      margin-top: 40px;
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <p class="subtitle">LA VOIE DU GUERRIER</p>

  <div class="card" id="card">
    <div class="icon">⚔️</div>
    <h2 id="title">VÉRIFICATION EN COURS</h2>
    <p id="message">Validation de ton lien...</p>
    <a href="#" class="btn" id="btn" style="display:none">OUVRIR RONIN TRAQ</a>
  </div>

  <p class="footer">RONIN TRAQ © 2026</p>

  <script>
    var SUPABASE_URL = 'https://xqmlxesasmnhvfggsghi.supabase.co';
    var CONFIRM_PAGE = 'https://ronintraq.fr/auth/confirm';

    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    var token_hash = params.get('token_hash');
    var type = params.get('type') || 'signup';

    if (token || token_hash) {
      // Forward to the real Supabase verification endpoint
      // After verification, Supabase will redirect to CONFIRM_PAGE
      // which will then open the app via deep link
      var verifyUrl = SUPABASE_URL + '/auth/v1/verify?';

      if (token_hash) {
        verifyUrl += 'token_hash=' + encodeURIComponent(token_hash);
      } else {
        verifyUrl += 'token=' + encodeURIComponent(token);
      }
      verifyUrl += '&type=' + encodeURIComponent(type);
      verifyUrl += '&redirect_to=' + encodeURIComponent(CONFIRM_PAGE);

      window.location.href = verifyUrl;
    } else {
      document.getElementById('title').textContent = 'LIEN INVALIDE';
      document.getElementById('message').textContent = "Ce lien est invalide ou a déjà été utilisé. Retourne dans l'application pour en demander un nouveau.";
      document.getElementById('card').classList.add('error');
    }
  </script>
</body>
</html>
